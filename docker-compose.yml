services:
    postgres-db:
      image: postgres:16-alpine
      container_name: postgres-container
      ports:
        - "5432:5432"
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: bookingdb
      volumes:
        - postgres_data:/var/lib/postgresql/data

    redis-cache:
      image: redis:7-alpine
      container_name: redis-container
      ports:
        - "6379:6379"
      volumes:
        - redis_data:/data

    bookingsystem-app:
      build: .
      container_name: bookingsystem-app
      ports:
        - "8080:8080"
      depends_on:
        - postgres-db
        - redis-cache
      environment:
        SPRING_PROFILES_ACTIVE: prod
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/bookingdb
        SPRING_DATA_REDIS_HOST: redis-cache

volumes:
  postgres_data:
  redis_data:
