spring:
  application:
    name: bookingsystem
  jpa:
    defer-datasource-initialization: true
    properties:
      hibernate:
        default_batch_fetch_size: 20
  datasource:
    generate-unique-name: false
    url: jdbc:h2:mem:bookingdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
  security:
    jwt:
      secret-key: 404E635266556A586E3274234872394827342B6250645367566B5970
      expiration-time: 86400000 # 24 hours in milliseconds
      algorithm: HS256
